version: "3.9"

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: sentinelrag_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sentinelrag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sentinelrag_secret}
      POSTGRES_DB: ${POSTGRES_DB:-sentinelrag_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sentinelrag} -d ${POSTGRES_DB:-sentinelrag_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sentinelrag_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-sentinelrag}:${POSTGRES_PASSWORD:-sentinelrag_secret}@db:5432/${POSTGRES_DB:-sentinelrag_db}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./docs/sample:/app/data/sample:ro
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend/chat-ui
      dockerfile: Dockerfile
    container_name: sentinelrag_frontend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      BACKEND_URL: http://backend:8000
    ports:
      - "8501:8501"
    depends_on:
      - backend
    command: streamlit run app.py --server.port 8501 --server.address 0.0.0.0

volumes:
  postgres_data:
